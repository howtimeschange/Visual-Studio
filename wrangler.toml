name = "image-translator"
compatibility_date = "2025-01-01"
pages_build_output_dir = "public"

# Server-side default keys (optional). Users can override via the in-app Settings (BYOK).
# Set with: wrangler pages secret put VISION_API_KEY --project-name=image-translator
# Optional V2 foundation secrets:
# wrangler pages secret put CREDENTIAL_KEK --project-name=image-translator

# Persistent data bindings. Fill database_id after creating the D1 database:
# wrangler d1 create visual-studio
# wrangler d1 migrations apply visual-studio --local
# wrangler d1 migrations apply visual-studio --remote
[[d1_databases]]
binding = "VS_DB"
database_name = "visual-studio"
database_id = "628e04ac-8d74-44f5-99b9-12a6aafcaf2c"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "VS_INPUTS_BUCKET"
bucket_name = "visual-studio-inputs"

[[r2_buckets]]
binding = "VS_RESULTS_BUCKET"
bucket_name = "visual-studio-results"

[[r2_buckets]]
binding = "VS_TEMP_BUCKET"
bucket_name = "visual-studio-temp"

# Queue producer for durable job dispatch. The Pages Function falls back to waitUntil
# when this binding is not provisioned by the deployment environment.
[[queues.producers]]
binding = "VS_TRANSLATE_JOBS_QUEUE"
queue = "visual-studio-translate-jobs"

[[queues.producers]]
binding = "VS_OUTFIT_JOBS_QUEUE"
queue = "visual-studio-outfit-jobs"

[vars]
VS_QUEUE_EXECUTION_MODE = "queue"
# RELAY_BASE_URL = "https://api.1xm.ai/v1"
# ADMIN_EMAILS = "owner@example.com" # comma-separated admin account emails for /admin
# VS_IMAGE_REQUEST_TIMEOUT_MS = "300000"
